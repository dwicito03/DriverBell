<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="DriverBell brand icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d5037"/>
      <stop offset="100%" stop-color="#123a2a"/>
    </linearGradient>
    <linearGradient id="bell" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd974"/>
      <stop offset="100%" stop-color="#e2a31b"/>
    </linearGradient>
    <pattern id="batik" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="#7f5a25"/>
      <circle cx="4" cy="4" r="1.8" fill="#e8c36c"/>
      <circle cx="12" cy="12" r="1.8" fill="#e8c36c"/>
      <path d="M8 2l2 2-2 2-2-2zM8 10l2 2-2 2-2-2z" fill="#c89945"/>
    </pattern>
  </defs>

  <rect width="256" height="256" rx="56" fill="url(#bg)"/>

  <!-- Bell -->
  <g transform="translate(146 44)">
    <path d="M42 6c-23 0-40 17-40 40v27c0 9-3 18-9 24l-5 5c-3 3-1 9 4 9h100c5 0 7-6 4-9l-5-5c-6-6-9-15-9-24V46C82 23 65 6 42 6z"
          fill="url(#bell)" stroke="#8e600b" stroke-width="5"/>
    <path d="M22 118c4 14 12 22 20 22s16-8 20-22" fill="none" stroke="#8e600b" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Person silhouette (no visible face), facing bell -->
  <g transform="translate(26 40)">
    <!-- head/back -->
    <ellipse cx="56" cy="42" rx="18" ry="20" fill="#1b2a24"/>
    <!-- neck and shoulder -->
    <path d="M40 58c-12 6-18 15-20 29l0 4h56l0-8c0-12-7-21-18-26z" fill="#1b2a24"/>
    <!-- batik shirt -->
    <path d="M18 88h92c18 0 28 11 30 31l4 47H2l4-47c2-20 12-31 12-31z" fill="url(#batik)" stroke="#5d4019" stroke-width="4"/>
    <!-- arm to bell -->
    <path d="M92 110c22 8 41 20 58 38" fill="none" stroke="#1b2a24" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- Plus-shaped bell striker -->
  <g transform="translate(173 167)">
    <circle r="22" fill="#f8edc9" stroke="#91661e" stroke-width="5"/>
    <rect x="-5" y="-14" width="10" height="28" rx="3" fill="#1d5037"/>
    <rect x="-14" y="-5" width="28" height="10" rx="3" fill="#1d5037"/>
    <path d="M-37 -15L-14 -2" stroke="#d8b35a" stroke-width="7" stroke-linecap="round"/>
  </g>
</svg>
